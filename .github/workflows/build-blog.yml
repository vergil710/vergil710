name: Build blog

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "next.config.ts"
      - "tsconfig.json"
      - "postcss.config.mjs"
      - ".github/workflows/build-blog.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site into docs
        run: |
          pnpm build --webpack
          rm -rf docs
          cp -R out docs
        env:
          NEXT_PUBLIC_BASE_PATH: /vergil710
          NEXT_PUBLIC_GITHUB_OWNER: vergil710
          NEXT_PUBLIC_GITHUB_REPO: vergil710
          NEXT_PUBLIC_GITHUB_BRANCH: master

      - name: Add GitHub Pages marker
        run: touch docs/.nojekyll

      - name: Commit generated site
        run: |
          set -euo pipefail
          if git diff --quiet -- docs; then
            echo "No generated site changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "Build blog [skip ci]"
          git push
