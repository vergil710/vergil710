baseurl: https://vergil710.github.io/vergil710/
locale: zh-cn
theme: hugo-theme-stack
paginate: 8
title: Vergil 的研究札记

DefaultContentLanguage: zh-cn
hasCJKLanguage: true

taxonomies:
    category: categories
    tag: tags

permalinks:
    post: /p/:slug/
    page: /:slug/

params:
    mainSections:
        - post
    featuredImageField: image
    rssFullContent: true
    favicon:

    footer:
        since: 2026
        customText: "保持好奇，保持可复现。"

    dateFormat:
        published: 2006-01-02
        lastUpdated: 2006-01-02 15:04 MST

    sidebar:
        emoji:
        subtitle: 重载列车控制、智能优化、科研写作与个人知识管理。
        avatar: img/avatar.png

    article:
        math: true
        toc: true
        readingTime: true
        license:
            enabled: true
            default: CC BY-NC-SA 4.0

    comments:
        enabled: false
        provider: giscus

        giscus:
            repo:
            repoID:
            category:
            categoryID:
            mapping: pathname
            lightTheme: light
            darkTheme: dark
            reactionsEnabled: 1
            emitMetadata: 0

    widgets:
        homepage:
            - type: search
            - type: archives
              params:
                  limit: 5
            - type: categories
              params:
                  limit: 10
            - type: tag-cloud
              params:
                  limit: 20
        page:
            - type: toc

    opengraph:
        twitter:
            site:
            card: summary_large_image

    defaultImage:
        opengraph:
            enabled: false
            local: false
            src:

    colorScheme:
        toggle: true
        default: auto

    imageProcessing:
        cover:
            enabled: true
        content:
            enabled: true

menu:
    main:
        - identifier: home
          name: 首页
          url: /
          weight: 10
          params:
              icon: home

        - identifier: about
          name: 关于
          url: /about/
          weight: 20
          params:
              icon: user

        - identifier: research
          name: 研究
          url: /research/
          weight: 30
          params:
              icon: hash

        - identifier: archives
          name: 归档
          url: /archives/
          weight: 40
          params:
              icon: archives

        - identifier: search
          name: 搜索
          url: /search/
          weight: 50
          params:
              icon: search

    social:
        - identifier: github
          name: GitHub
          url: https://github.com/vergil710
          params:
              icon: brand-github

related:
    includeNewer: true
    threshold: 60
    toLower: false
    indices:
        - name: tags
          weight: 100
        - name: categories
          weight: 200

markup:
    goldmark:
        renderer:
            unsafe: false
    tableOfContents:
        endLevel: 4
        ordered: true
        startLevel: 2
    highlight:
        noClasses: false
        codeFences: true
        guessSyntax: true
        lineNoStart: 1
        lineNos: true
        lineNumbersInTable: true
        tabWidth: 4
